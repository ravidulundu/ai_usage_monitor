name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  project-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev-tools qt6-declarative-dev-tools shellcheck
          echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"
          if command -v qtpaths6 >/dev/null 2>&1; then
            qtpaths6 --query QT_HOST_BINS >> "$GITHUB_PATH"
          fi

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run strict health gates (warnings fail in CI)
        run: make health-ci PYTHON=python
