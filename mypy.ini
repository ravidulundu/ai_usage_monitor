[mypy]
python_version = 3.11
files = core/ai_usage_monitor
namespace_packages = True
mypy_path = .
pretty = True
show_error_codes = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
check_untyped_defs = True
warn_unreachable = True
disallow_incomplete_defs = True
incremental = True
cache_dir = .mypy_cache

# Temporary typed-debt quarantine list.
# These modules are kept in typecheck scope via explicit overrides so they are
# visible and can be reduced incrementally without blocking all development.
# Phase-3 scoped strictness: disallow untyped defs in core-critical modules.
[mypy-core.ai_usage_monitor.sources.*]
disallow_untyped_defs = True
disallow_untyped_calls = True

[mypy-core.ai_usage_monitor.models]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.identity_apply]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.identity_apply_context]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.identity_apply_store]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.presentation.popup_vm_source]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.presentation.popup_vm_source_model]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.presentation.popup_vm_source_presentation]
disallow_untyped_defs = True

[mypy-core.ai_usage_monitor.presentation.*]
disallow_untyped_calls = True

# Phase-2 temporary carve-outs: keep high-noise provider modules out of
# disallow_incomplete_defs until provider typing pass.
